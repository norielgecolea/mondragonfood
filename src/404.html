<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Mondragon Food Products</title>
  <script type="text/javascript">
    // GitHub Pages SPA fallback (custom domain at root).
    (function (location) {
      var pathSegmentsToKeep = 0;
      location.replace(
        location.protocol +
          '//' +
          location.hostname +
          (location.port ? ':' + location.port : '') +
          location.pathname
            .split('/')
            .slice(0, 1 + pathSegmentsToKeep)
            .join('/') +
          '/?/' +
          location.pathname
            .slice(1)
            .split('/')
            .slice(pathSegmentsToKeep)
            .join('/')
            .replace(/&/g, '~and~') +
          (location.search ? '&' + location.search.slice(1).replace(/&/g, '~and~') : '') +
          location.hash,
      );
    })(window.location);
  </script>
</head>
<body></body>
</html>
