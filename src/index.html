<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Mondragon Food Products</title>
  <script type="text/javascript">
    // Restore deep links after GitHub Pages SPA redirect.
    (function (location) {
      if (location.search[1] === '/') {
        var decoded = location.search
          .slice(1)
          .split('&')
          .map(function (segment) {
            return segment.replace(/~and~/g, '&');
          })
          .join('?');
        window.history.replaceState(null, null, location.pathname.slice(0, -1) + decoded + location.hash);
      }
    })(window.location);
  </script>
  <base href="/">
  
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" type="image/x-icon" href="favicon.ico">
</head>
<body>
  <app-root></app-root>
</body>
</html>
